name: Update Homebrew Cask

# Runs automatically after a GitHub Release is published.
# Downloads the new DMG, computes SHA256, and commits the updated
# formula to ryyansafar/homebrew-macmonitor so users get it via
#   brew upgrade --cask macmonitor
#
# REQUIRED SECRET: add a Personal Access Token with repo scope as
#   Settings → Secrets → Actions → HOMEBREW_TAP_TOKEN
# (see README — "Releasing a new version")

on:
  release:
    types: [published]

jobs:
  update-cask:
    name: Bump Cask version + SHA256
    runs-on: ubuntu-latest

    steps:
      # ── 1. Extract version ─────────────────────────────────────────────────────
      - name: Extract version from tag
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── 2. Download DMG & compute SHA256 ───────────────────────────────────────
      - name: Compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          URL="https://github.com/ryyansafar/MacMonitor/releases/download/v${VERSION}/MacMonitor-${VERSION}.dmg"
          echo "Downloading: $URL"
          curl -fsSL "$URL" -o MacMonitor.dmg
          SHA=$(shasum -a 256 MacMonitor.dmg | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      # ── 3. Checkout homebrew-macmonitor tap ────────────────────────────────────
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ryyansafar/homebrew-macmonitor
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      # ── 4. Patch Casks/macmonitor.rb ───────────────────────────────────────────
      - name: Update formula
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          sed -i "s/  version \".*\"/  version \"${VERSION}\"/" tap/Casks/macmonitor.rb
          sed -i "s/  sha256 \".*\"/  sha256 \"${SHA}\"/"       tap/Casks/macmonitor.rb
          echo "Updated formula to v${VERSION} / ${SHA}"

      # ── 5. Commit & push to tap ────────────────────────────────────────────────
      - name: Commit and push
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macmonitor.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump macmonitor to v${{ steps.ver.outputs.version }}"
          git push
